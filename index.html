<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program Design Study</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Program Design Assessment</h1>
        </header>

        <main id="main-content">
            <!-- トップ画面 -->
            <div id="setup-view">
                <p class="instruction">学習するセクションを選択してください</p>
                <div id="section-selector"></div>
                <button class="btn-outline" onclick="startQuiz()">Start Quiz</button>
            </div>

            <!-- クイズ画面 -->
            <div id="quiz-view" style="display:none;">
                <div class="meta-info">
                    <span id="current-section"></span>
                    <span id="progress-text"></span>
                </div>
                <div class="question-box">
                    <p id="question-sentence"></p>
                    <input type="text" id="answer-input" autocomplete="off" placeholder="単語を入力">
                </div>
                <div id="result-area"></div>
                <div class="nav-btns">
                    <button id="check-btn" class="btn-outline" onclick="checkAnswer()">回答</button>
                    <button id="next-btn" class="btn-outline" style="display:none;" onclick="nextQuestion()">次へ</button>
                </div>
                <a href="#" class="back-link" onclick="location.reload()">トップに戻る</a>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
