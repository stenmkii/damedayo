<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>プログラム設計 学習フォーム</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>プログラム設計 学習支援</h1>
        </header>

        <!-- モード選択画面 -->
        <section id="top-page">
            <h2>学習モードを選択してください</h2>
            <div class="mode-buttons">
                <button onclick="startApp('wordToMeaning')">単語 → 意味</button>
                <button onclick="startApp('meaningToWord')">意味 → 単語</button>
            </div>
            <div class="section-choice">
                <h3>出題セクション</h3>
                <div id="section-list"></div>
            </div>
        </section>

        <!-- クイズ画面 -->
        <section id="quiz-page" style="display:none;">
            <div class="quiz-header">
                <span id="current-section-title"></span>
                <button class="btn-small" onclick="backToTop()">トップに戻る</button>
            </div>
            <div id="question-container">
                <p id="question-text"></p>
                <div id="answer-input-area">
                    <input type="text" id="answer-input" placeholder="回答を入力...">
                    <button id="submit-btn" onclick="checkAnswer()">判定</button>
                </div>
                <div id="feedback" class="feedback"></div>
                <div id="correct-answer" style="display:none;"></div>
                <button id="next-btn" style="display:none;" onclick="nextQuestion()">次へ</button>
            </div>
            <div class="progress">残り: <span id="remaining-count"></span></div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
